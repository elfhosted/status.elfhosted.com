<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="ElfHosted status">
  <title>ElfHosted status</title>
  <!-- Deliberately not the ElfHosted logo. That's a detailed illustration and
       renders as an unreadable smudge at 16px, which is the only size a favicon
       is ever actually seen at. Three bars echo the availability strip the page
       is built around, and read cleanly on both light and dark tab strips.
       availability.js recolours this at runtime to reflect live fleet status;
       this static file is the "all operational" state. -->
  <rect width="32" height="32" rx="8" fill="#35b37e"/>
  <rect x="6" y="9" width="5" height="14" rx="2.5" fill="#101613"/>
  <rect x="13.5" y="6" width="5" height="20" rx="2.5" fill="#101613"/>
  <rect x="21" y="12" width="5" height="8" rx="2.5" fill="#101613"/>
</svg>
